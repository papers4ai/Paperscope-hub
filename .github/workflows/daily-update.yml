name: Daily Paper Update

on:
  schedule:
    # 北京时间 10:05（UTC 02:05）和 18:05（UTC 10:05）各抓取一次
    - cron: '5 2,10 * * *'
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - 'output/**'   # 忽略 output 目录的变更，防止工作流自循环触发

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── 恢复 progress.json 历史数据缓存 ──
      - name: Restore papers cache
        uses: actions/cache@v4
        with:
          path: output/progress.json
          key: papers-progress-${{ github.run_id }}
          restore-keys: |
            papers-progress-

      # ── 抓取论文（自动更新关键词 + 抓取）──
      - name: Fetch new papers (scheduled / manual only)
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: ${{ vars.LLM_BASE_URL }}
          LLM_MODEL: ${{ vars.LLM_MODEL }}
        run: |
          # 如果没有历史数据，执行全量抓取；否则增量更新
          if [ ! -f output/progress.json ] || [ $(python3 -c "import json; d=json.load(open('output/progress.json')); print(len(d.get('papers',[])))") -lt 100 ]; then
            echo "No historical data found, running full fetch..."
            python main.py --full --update-keywords
          else
            python main.py --update-keywords
          fi

      # ── Pipeline ──
      # Push 触发：跳过 arXiv 抓取 + 跳过 GLM trending（用缓存），快速部署
      # 定时触发：完整运行，含 GLM trending 重计算
      - name: Run pipeline
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: ${{ vars.LLM_BASE_URL }}
          LLM_MODEL: ${{ vars.LLM_MODEL }}
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            python pipeline.py --skip-trending
          else
            python pipeline.py
          fi

      - name: Commit updated output files
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add output/ keywords.json
          git diff --cached --quiet || git commit -m "chore: update papers and keywords $(date +%Y-%m-%d)"
          git pull --rebase origin main
          git push origin main

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
