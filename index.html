<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔭</text></svg>">
  <title>Paperscope - 世界模型 | 物理AI | 医疗AI</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --world-model: #6366f1;
      --physical-ai: #10b981;
      --medical-ai: #f43f5e;
      --bg: #0a0a0f;
      --card-bg: #1a1a24;
      --text: #ffffff;
      --text-secondary: #a0a0b0;
      --text-muted: #6b6b7b;
      --border: #2a2a3a;
      --accent: #818cf8;
      --header-bg: rgba(18,18,26,0.95);
      --surface-hover: rgba(255,255,255,0.03);
      --surface-bg: rgba(255,255,255,0.04);
      --surface-border: rgba(255,255,255,0.06);
      --surface-hover-border: rgba(255,255,255,0.12);
      --header-border: rgba(255,255,255,0.06);
      --logo-gradient: linear-gradient(90deg,#fff,#a0a0b0);
      --glow-a: rgba(99,102,241,0.12);
      --glow-b: rgba(16,185,129,0.08);
    }
    :root[data-theme="light"] {
      --bg: #f5f5f8;
      --card-bg: #ffffff;
      --text: #1a1a2e;
      --text-secondary: #555566;
      --text-muted: #888899;
      --border: #e0e0e8;
      --accent: #6366f1;
      --header-bg: rgba(255,255,255,0.92);
      --surface-hover: rgba(0,0,0,0.02);
      --surface-bg: rgba(0,0,0,0.03);
      --surface-border: rgba(0,0,0,0.06);
      --surface-hover-border: rgba(0,0,0,0.12);
      --header-border: rgba(0,0,0,0.06);
      --logo-gradient: linear-gradient(90deg,#1a1a2e,#555566);
      --glow-a: rgba(99,102,241,0.06);
      --glow-b: rgba(16,185,129,0.04);
    }
    body {
      font-family: 'Inter', 'Noto Sans SC', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
      transition: background 0.3s, color 0.3s;
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background: radial-gradient(ellipse at 20% 0%, var(--glow-a) 0%, transparent 50%),
                  radial-gradient(ellipse at 80% 100%, var(--glow-b) 0%, transparent 50%);
      pointer-events: none; z-index: -1;
    }

    /* Header controls */
    .header-controls { display: flex; gap: 0.5rem; margin-left: auto; align-items: center; }
    .toggle-group {
      display: flex; gap: 0.25rem; align-items: center;
      background: var(--card-bg); border: 1px solid var(--border); border-radius: 8px;
      padding: 0.15rem; font-size: 0.75rem;
    }
    .toggle-btn {
      padding: 0.3rem 0.5rem; border-radius: 6px; cursor: pointer;
      border: none; background: transparent; color: var(--text-muted);
      font-size: 0.8rem; line-height: 1; transition: all 0.2s;
    }
    .toggle-btn:hover { color: var(--text); }
    .toggle-btn.active { background: var(--accent); color: #fff; }
    .lang-btn { font-size: 0.7rem; font-weight: 600; padding: 0.3rem 0.45rem; }

    /* Header */
    .header {
      background: var(--header-bg);
      border-bottom: 1px solid var(--border);
      padding: 1.25rem 0;
      position: sticky; top: 0; z-index: 100;
      backdrop-filter: blur(20px);
      transition: background 0.3s;
    }
    .header-content { max-width: 1400px; margin: 0 auto; padding: 0 1.5rem; display: flex; align-items: center; gap: 1.5rem; flex-wrap: wrap; }
    .logo { display: flex; align-items: center; gap: 0.75rem; }
    .logo h1 { font-size: 1.4rem; font-weight: 700; background: var(--logo-gradient); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .logo-badge { font-size: 0.65rem; padding: 0.2rem 0.5rem; background: rgba(129,140,248,0.15); color: var(--accent); border-radius: 20px; }

    /* Domain tabs */
    .domain-tabs { display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .domain-tab {
      padding: 0.45rem 0.85rem; border-radius: 8px; font-size: 0.8rem; font-weight: 500;
      cursor: pointer; transition: all 0.2s; border: 1px solid transparent;
    }
    .domain-tab.all { background: var(--surface-bg); color: var(--text); border-color: var(--border); }
    .domain-tab.all.active { background: var(--surface-hover-border); border-color: var(--text); }
    .domain-tab.world_model { background: rgba(99,102,241,0.12); color: #a5b4fc; border-color: rgba(99,102,241,0.3); }
    :root[data-theme="light"] .domain-tab.world_model { color: #4f46e5; }
    .domain-tab.world_model.active { background: rgba(99,102,241,0.25); border-color: var(--world-model); }
    .domain-tab.physical_ai { background: rgba(16,185,129,0.12); color: #6ee7b7; border-color: rgba(16,185,129,0.3); }
    :root[data-theme="light"] .domain-tab.physical_ai { color: #059669; }
    .domain-tab.physical_ai.active { background: rgba(16,185,129,0.25); border-color: var(--physical-ai); }
    .domain-tab.medical_ai { background: rgba(244,63,94,0.12); color: #fda4af; border-color: rgba(244,63,94,0.3); }
    :root[data-theme="light"] .domain-tab.medical_ai { color: #e11d48; }
    .domain-tab.medical_ai.active { background: rgba(244,63,94,0.25); border-color: var(--medical-ai); }

    .container { max-width: 1400px; margin: 0 auto; padding: 1rem 1.5rem 2rem; }

    /* Stat cards */
    .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.6rem; margin-bottom: 1rem; }
    .stat-card {
      background: var(--card-bg); border: 1px solid var(--border); border-radius: 10px;
      padding: 1rem; text-align: center; transition: all 0.2s; position: relative; cursor: pointer;
    }
    .stat-card:hover { border-color: var(--accent); transform: translateY(-1px); }
    .stat-value { font-size: 1.6rem; font-weight: 700; }
    .stat-value.world_model { color: #a5b4fc; }
    .stat-value.physical_ai { color: #6ee7b7; }
    .stat-value.medical_ai { color: #fda4af; }
    :root[data-theme="light"] .stat-value.world_model { color: #4f46e5; }
    :root[data-theme="light"] .stat-value.physical_ai { color: #059669; }
    :root[data-theme="light"] .stat-value.medical_ai { color: #e11d48; }
    .stat-card .new-badge {
      position: absolute; top: 0.5rem; right: 0.5rem;
      background: linear-gradient(135deg, #22c55e, #16a34a); color: white;
      font-size: 0.65rem; padding: 0.15rem 0.4rem; border-radius: 8px; font-weight: 600;
    }
    .stat-label { font-size: 0.75rem; color: var(--text-muted); margin-top: 0.25rem; }

    /* Subdomain */
    .subdomain-section {
      background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px;
      padding: 1rem 1.25rem; margin-bottom: 1rem;
    }
    .subdomain-title {
      font-size: 0.8rem; font-weight: 500; margin-bottom: 0.85rem; color: var(--text-muted);
      display: flex; align-items: center; gap: 0.4rem;
    }
    .subdomain-grid {
      display: flex; flex-wrap: wrap; gap: 0.5rem; align-items: flex-start;
    }
    .subdomain-domain-header {
      width: 100%; font-size: 0.75rem; font-weight: 600;
      color: var(--text-muted); margin: 0.5rem 0 0.25rem;
      padding-bottom: 0.25rem; border-bottom: 1px solid var(--surface-border);
    }
    .subdomain-domain-header:first-child { margin-top: 0; }
    .subdomain-item {
      display: inline-flex; align-items: center; gap: 0.4rem;
      padding: 0.45rem 0.75rem; border-radius: 20px;
      background: var(--surface-bg); border: 1px solid var(--surface-border);
      cursor: pointer; transition: all 0.2s ease;
      font-size: 0.8rem;
    }
    .subdomain-item:hover {
      background: var(--surface-hover-border); border-color: var(--surface-hover-border);
      transform: translateY(-1px);
    }
    .subdomain-item.active {
      background: linear-gradient(135deg, rgba(99,102,241,0.15), rgba(99,102,241,0.08));
      border-color: rgba(99,102,241,0.4);
    }
    .subdomain-item .name {
      color: var(--text-secondary); font-weight: 500;
    }
    .subdomain-item .count {
      font-weight: 600; color: var(--text);
    }
    .subdomain-item .new-badge {
      display: inline-flex; align-items: center; justify-content: center;
      min-width: 18px; height: 18px; padding: 0 5px;
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: white; font-size: 0.65rem; font-weight: 600;
      border-radius: 10px; margin-left: 2px;
    }

    /* Charts */
    .charts-section {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin-bottom: 1rem;
    }
    .chart-panel {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }
    .chart-header {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.85rem 1rem;
      border-bottom: 1px solid var(--border);
      background: var(--surface-hover);
    }
    .chart-icon { font-size: 1rem; }
    .chart-title {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-secondary);
    }
    .chart-body {
      padding: 1rem;
      min-height: 200px;
    }
    .trend-bar-group {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .trend-year {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    .trend-year-label {
      width: 36px;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-secondary);
    }
    .trend-bars {
      flex: 1;
      display: flex;
      height: 20px;
      border-radius: 4px;
      overflow: hidden;
      background: var(--surface-bg);
    }
    .trend-bar {
      height: 100%;
      transition: all 0.3s ease;
      position: relative;
      min-width: 2px;
    }
    .trend-bar:hover { filter: brightness(1.2); }
    .trend-bar.world_model { background: linear-gradient(90deg, #6366f1, #818cf8); }
    .trend-bar.physical_ai { background: linear-gradient(90deg, #10b981, #34d399); }
    .trend-bar.medical_ai { background: linear-gradient(90deg, #f43f5e, #fb7185); }
    .trend-count {
      width: 45px;
      text-align: right;
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--text-secondary);
    }
    .hot-item {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 0.5rem;
    }
    .hot-rank {
      width: 20px;
      height: 20px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.65rem;
      font-weight: 700;
      background: var(--accent);
      color: white;
    }
    .hot-rank.rank-1 { background: linear-gradient(135deg, #f59e0b, #d97706); }
    .hot-rank.rank-2 { background: linear-gradient(135deg, #94a3b8, #64748b); }
    .hot-rank.rank-3 { background: linear-gradient(135deg, #b45309, #92400e); }
    .hot-rank.rank-other { background: var(--accent); color: #fff; }
    .hot-name {
      flex: 1;
      font-size: 0.8rem;
      color: var(--text);
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .hot-bar-wrap {
      width: 80px;
      height: 8px;
      background: var(--surface-bg);
      border-radius: 4px;
      overflow: hidden;
    }
    .hot-bar {
      height: 100%;
      border-radius: 4px;
      background: linear-gradient(90deg, var(--accent), #a78bfa);
      transition: width 0.5s ease;
    }
    .hot-bar.world_model { background: linear-gradient(90deg, #6366f1, #818cf8); }
    .hot-bar.physical_ai { background: linear-gradient(90deg, #10b981, #34d399); }
    .hot-bar.medical_ai { background: linear-gradient(90deg, #f43f5e, #fb7185); }
    .hot-domain-header {
      font-size: 0.7rem; font-weight: 600; margin: 0.6rem 0 0.3rem;
      padding-bottom: 0.2rem; border-bottom: 1px solid var(--surface-border);
    }
    .hot-domain-header.world_model { color: #a5b4fc; }
    .hot-domain-header.physical_ai { color: #6ee7b7; }
    .hot-domain-header.medical_ai { color: #fda4af; }
    :root[data-theme="light"] .hot-domain-header.world_model { color: #4f46e5; }
    :root[data-theme="light"] .hot-domain-header.physical_ai { color: #059669; }
    :root[data-theme="light"] .hot-domain-header.medical_ai { color: #e11d48; }
    .hot-domain-header:first-child { margin-top: 0; }
    .hot-count {
      width: 35px;
      text-align: right;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-secondary);
    }

    /* Filters */
    .filter-row { display: flex; gap: 0.6rem; margin-bottom: 1rem; flex-wrap: wrap; align-items: center; }
    .search-box { flex: 1; min-width: 200px; position: relative; }
    .search-box input {
      width: 100%; padding: 0.6rem 0.8rem 0.6rem 2.2rem;
      background: var(--card-bg); border: 1px solid var(--border); border-radius: 8px;
      color: var(--text); font-size: 0.85rem;
    }
    .search-box input:focus { outline: none; border-color: var(--accent); }
    .search-box::before { content: '🔍'; position: absolute; left: 0.7rem; top: 50%; transform: translateY(-50%); font-size: 0.85rem; opacity: 0.5; }
    .filter-select {
      padding: 0.6rem 0.8rem; background: var(--card-bg); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text); font-size: 0.8rem; cursor: pointer; min-width: 100px;
    }
    .filter-select:focus { outline: none; border-color: var(--accent); }

    .action-btns { display: flex; gap: 0.4rem; margin-left: auto; }
    .action-btn {
      padding: 0.6rem 0.85rem; border-radius: 8px; font-size: 0.75rem; font-weight: 500;
      cursor: pointer; border: 1px solid var(--border); background: var(--card-bg);
      color: var(--text-secondary); transition: all 0.2s;
    }
    .action-btn:hover { background: var(--card-bg); color: var(--text); }
    .action-btn.active { background: rgba(129,140,248,0.2); color: var(--accent); border-color: var(--accent); }

    .results-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.6rem; }
    .results-count { color: var(--text-secondary); font-size: 0.8rem; }

    /* Paper cards */
    .papers-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 0.6rem; }
    .paper-card {
      background: var(--card-bg); border: 1px solid var(--border); border-radius: 10px;
      padding: 0.9rem; transition: all 0.2s; display: flex; flex-direction: column;
    }
    .paper-card:hover { background: var(--surface-hover); border-color: var(--border); transform: translateY(-1px); }
    :root[data-theme="light"] .paper-card:hover { border-color: #c0c0cc; }
    .paper-domains { display: flex; gap: 0.25rem; margin-bottom: 0.4rem; align-items: center; }
    .paper-domain-badge { font-size: 0.6rem; padding: 0.1rem 0.35rem; border-radius: 4px; font-weight: 600; }
    .paper-domain-badge.world_model { background: rgba(99,102,241,0.2); color: #a5b4fc; }
    .paper-domain-badge.physical_ai { background: rgba(16,185,129,0.2); color: #6ee7b7; }
    .paper-domain-badge.medical_ai { background: rgba(244,63,94,0.2); color: #fda4af; }
    :root[data-theme="light"] .paper-domain-badge.world_model { color: #4f46e5; }
    :root[data-theme="light"] .paper-domain-badge.physical_ai { color: #059669; }
    :root[data-theme="light"] .paper-domain-badge.medical_ai { color: #e11d48; }
    .paper-type { font-size: 0.55rem; padding: 0.1rem 0.3rem; border-radius: 3px; margin-left: auto; }
    .paper-type.Method { background: rgba(129,140,248,0.15); color: #818cf8; }
    .paper-type.Dataset { background: rgba(16,185,129,0.15); color: #34d399; }
    .paper-type.Survey { background: rgba(244,63,94,0.15); color: #fb7185; }
    :root[data-theme="light"] .paper-type.Method { color: #4f46e5; }
    :root[data-theme="light"] .paper-type.Dataset { color: #059669; }
    :root[data-theme="light"] .paper-type.Survey { color: #e11d48; }

    .paper-title { font-size: 0.9rem; font-weight: 600; margin-bottom: 0.35rem; line-height: 1.4; }
    .paper-meta { display: flex; flex-wrap: wrap; gap: 0.4rem; font-size: 0.7rem; color: var(--text-muted); margin-bottom: 0.4rem; }
    .paper-abstract { font-size: 0.75rem; color: var(--text-secondary); margin-bottom: 0.3rem; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; flex: 1; }
    .paper-abstract.expanded { -webkit-line-clamp: unset; }
    .abstract-toggle { font-size: 0.7rem; color: var(--accent); cursor: pointer; margin-bottom: 0.4rem; user-select: none; display: inline-block; }
    .abstract-toggle:hover { text-decoration: underline; }
    .paper-tags { display: flex; flex-wrap: wrap; gap: 0.25rem; margin-bottom: 0.6rem; }
    .paper-task-tag { font-size: 0.6rem; padding: 0.1rem 0.35rem; background: var(--surface-bg); color: var(--text-muted); border-radius: 3px; }

    .paper-actions { display: flex; gap: 0.35rem; margin-top: auto; padding-top: 0.6rem; border-top: 1px solid var(--border); }
    .paper-action { display: inline-flex; align-items: center; gap: 0.25rem; padding: 0.35rem 0.6rem; border-radius: 5px; font-size: 0.7rem; text-decoration: none; font-weight: 500; }
    .paper-action.arxiv { background: rgba(244,63,94,0.12); color: #fb7185; }
    .paper-action.pdf { background: rgba(99,102,241,0.12); color: #a5b4fc; }
    .paper-action.code { background: rgba(16,185,129,0.12); color: #6ee7b7; }
    .paper-action.favorite { background: rgba(255,200,0,0.1); color: #fbbf24; cursor: pointer; border: none; }
    :root[data-theme="light"] .paper-action.arxiv { color: #e11d48; }
    :root[data-theme="light"] .paper-action.pdf { color: #4f46e5; }
    :root[data-theme="light"] .paper-action.code { color: #059669; }
    .paper-action.favorite.active { background: rgba(255,200,0,0.25); }

    /* Pagination */
    .pagination { display: flex; justify-content: center; gap: 0.35rem; margin-top: 1rem; }
    .page-btn { padding: 0.4rem 0.75rem; border-radius: 5px; font-size: 0.75rem; background: var(--card-bg); border: 1px solid var(--border); color: var(--text-secondary); cursor: pointer; }
    .page-btn:hover { background: var(--card-bg); }
    .page-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    .page-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .loading, .empty { text-align: center; padding: 2rem; color: var(--text-muted); }

    @media (max-width: 900px) {
      .stats-row { grid-template-columns: 1fr; }
    }
    @media (max-width: 600px) {
      .papers-grid { grid-template-columns: 1fr; }
      .filter-row { flex-direction: column; }
      .action-btns { margin-left: 0; width: 100%; justify-content: center; }
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="header-content">
      <div class="logo">
        <h1>Paperscope</h1>
        <span class="logo-badge">arXiv</span>
      </div>
      <div class="domain-tabs">
        <button class="domain-tab all active" data-domain="all"></button>
        <button class="domain-tab world_model" data-domain="world_model"></button>
        <button class="domain-tab physical_ai" data-domain="physical_ai"></button>
        <button class="domain-tab medical_ai" data-domain="medical_ai"></button>
      </div>
      <div class="header-controls">
        <div class="toggle-group" id="langToggle">
          <button class="toggle-btn lang-btn active" data-lang="zh">中</button>
          <button class="toggle-btn lang-btn" data-lang="en">EN</button>
        </div>
        <div class="toggle-group" id="themeToggle">
          <button class="toggle-btn" data-theme="dark" title="Dark">🌙</button>
          <button class="toggle-btn" data-theme="light" title="Light">☀️</button>
          <button class="toggle-btn" data-theme="system" title="System">💻</button>
        </div>
      </div>
    </div>
  </header>

  <main class="container">
    <div class="stats-row">
      <div class="stat-card" data-switch-domain="all" style="border-color: rgba(148,163,184,0.3);">
        <div class="new-badge" id="newBadgeTotal">+0</div>
        <div class="stat-value" id="totalCount" style="color:#94a3b8;">-</div>
        <div class="stat-label" data-i18n="labelAll"></div>
      </div>
      <div class="stat-card" data-switch-domain="world_model" style="border-color: rgba(99,102,241,0.3);">
        <div class="new-badge" id="newBadgeWM">+0</div>
        <div class="stat-value world_model" id="worldModelCount">-</div>
        <div class="stat-label" data-i18n="labelWM"></div>
      </div>
      <div class="stat-card" data-switch-domain="physical_ai" style="border-color: rgba(16,185,129,0.3);">
        <div class="new-badge" id="newBadgePA">+0</div>
        <div class="stat-value physical_ai" id="physicalAiCount">-</div>
        <div class="stat-label" data-i18n="labelPA"></div>
      </div>
      <div class="stat-card" data-switch-domain="medical_ai" style="border-color: rgba(244,63,94,0.3);">
        <div class="new-badge" id="newBadgeMA">+0</div>
        <div class="stat-value medical_ai" id="medicalAiCount">-</div>
        <div class="stat-label" data-i18n="labelMA"></div>
      </div>
    </div>

    <div class="subdomain-section" id="subdomainSection" style="display:none;">
      <div class="subdomain-title" data-i18n="subdomainTitle"></div>
      <div class="subdomain-grid" id="subdomainGrid"></div>
    </div>

    <div class="charts-section">
      <div class="chart-panel">
        <div class="chart-header">
          <span class="chart-icon">📈</span>
          <span class="chart-title" data-i18n="chartTrend"></span>
        </div>
        <div class="chart-body" id="yearTrendChart"></div>
      </div>
      <div class="chart-panel">
        <div class="chart-header">
          <span class="chart-icon">🔥</span>
          <span class="chart-title" data-i18n="chartHot"></span>
          <span class="chart-note" data-i18n="chartHotNote"></span>
        </div>
        <div class="chart-body" id="hotTopicsChart"></div>
      </div>
    </div>

    <div class="filter-row">
      <div class="search-box"><input type="text" id="searchInput"></div>
      <select class="filter-select" id="yearFilter"></select>
      <select class="filter-select" id="monthFilter"></select>
      <select class="filter-select" id="typeFilter"></select>
      <select class="filter-select" id="sortSelect"></select>
      <div class="action-btns">
        <button class="action-btn" id="hasCodeBtn"></button>
        <button class="action-btn" id="favoritesBtn"></button>
        <button class="action-btn" id="exportBtn"></button>
      </div>
    </div>

    <div class="results-header">
      <span class="results-count" id="resultsCount"></span>
    </div>
    <div class="papers-grid" id="papersGrid"><div class="loading" data-i18n="loading"></div></div>
    <div class="pagination" id="pagination"></div>
  </main>

  <script>
    // ====== i18n ======
    let currentLang = localStorage.getItem('paperHubLang') || 'en';
    const i18n = {
      zh: {
        docTitle: 'Paperscope - 世界模型 | 物理AI | 医疗AI',
        tabAll: '📚 全部', tabWM: '🌍 世界模型', tabPA: '⚛️ 物理AI', tabMA: '🏥 医疗AI',
        labelAll: '📚 全部', labelWM: '🌍 世界模型', labelPA: '⚛️ 物理AI', labelMA: '🏥 医疗AI',
        subdomainTitle: '📊 细分领域统计（本周新增）',
        chartTrend: '年度趋势', chartHot: '热门方向',
        trendLegendWM: '世界模型', trendLegendPA: '物理AI', trendLegendMA: '医疗AI',
        searchPlaceholder: '搜索标题、摘要、作者...',
        allYears: '全部年份', yearSuffix: '年',
        allMonths: '全部月份', monthNames: ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'],
        allTypes: '全部类型', typeMethod: '方法', typeDataset: '数据集', typeSurvey: '综述',
        sortNewest: '最新发布', sortOldest: '最旧发布',
        hasCode: '💻 有代码', favorites: '⭐ 收藏', export: '📥 导出',
        loading: '加载论文数据...',
        noMatch: '没有找到匹配的论文',
        noDataTitle: '📚 暂无数据', noDataHint: '请运行 python main.py && python pipeline.py',
        paperCount: n => `共 ${n} 篇论文`,
        expandAbstract: '展开摘要', collapseAbstract: '收起摘要',
        badgeMethod: '方法', badgeDataset: '数据集', badgeSurvey: '综述',
        domainNameWM: '世界模型', domainNamePA: '物理AI', domainNameMA: '医疗AI',
        alertNoFav: '您还没有收藏任何论文',
        taskNames: {
          VidGen:'视频生成', NeRF:'NeRF三维重建', MBRL:'模型强化学习', Sim2Real:'仿真到现实',
          EmbodiedWM:'具身世界模型', Predictive:'预测模型',
          PINN:'物理信息神经网络', NeuralOp:'神经算子', Embodied:'具身智能', RobotLearn:'机器人学习',
          FluidSim:'流体模拟', Climate:'气候预测', '3DRecon':'3D重建',
          Pathology:'病理AI', MedImg:'医学影像AI', Cancer:'癌症诊断', MedVLM:'医学多模态大模型',
          DrugMol:'药物分子设计', Protein:'蛋白质基因', Clinical:'临床决策支持', Surgery:'手术介入AI',
          HealthMon:'健康监测'
        }
      },
      en: {
        docTitle: 'Paperscope - World Model | Physical AI | Medical AI',
        tabAll: '📚 All', tabWM: '🌍 World Model', tabPA: '⚛️ Physical AI', tabMA: '🏥 Medical AI',
        labelAll: '📚 All', labelWM: '🌍 World Model', labelPA: '⚛️ Physical AI', labelMA: '🏥 Medical AI',
        subdomainTitle: '📊 Subdomain Stats (New This Week)',
        chartTrend: 'Yearly Trend', chartHot: 'Trending Topics',
        trendLegendWM: 'World Model', trendLegendPA: 'Physical AI', trendLegendMA: 'Medical AI',
        searchPlaceholder: 'Search title, abstract, authors...',
        allYears: 'All Years', yearSuffix: '',
        allMonths: 'All Months', monthNames: ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'],
        allTypes: 'All Types', typeMethod: 'Method', typeDataset: 'Dataset', typeSurvey: 'Survey',
        sortNewest: 'Newest', sortOldest: 'Oldest',
        hasCode: '💻 Code', favorites: '⭐ Saved', export: '📥 Export',
        loading: 'Loading papers...',
        noMatch: 'No matching papers found',
        noDataTitle: '📚 No Data', noDataHint: 'Run python main.py && python pipeline.py',
        paperCount: n => `${n} papers`,
        expandAbstract: 'Show more', collapseAbstract: 'Show less',
        badgeMethod: 'Method', badgeDataset: 'Dataset', badgeSurvey: 'Survey',
        domainNameWM: 'World Model', domainNamePA: 'Physical AI', domainNameMA: 'Medical AI',
        alertNoFav: 'No saved papers yet',
        taskNames: {
          VidGen:'Video Generation', NeRF:'NeRF 3D Reconstruction', MBRL:'Model-Based RL', Sim2Real:'Sim2Real',
          EmbodiedWM:'Embodied World Model', Predictive:'Predictive Model',
          PINN:'Physics-Informed NN', NeuralOp:'Neural Operator', Embodied:'Embodied AI', RobotLearn:'Robot Learning',
          FluidSim:'Fluid Simulation', Climate:'Climate Prediction', '3DRecon':'3D Reconstruction',
          Pathology:'Pathology AI', MedImg:'Medical Imaging AI', Cancer:'Cancer Diagnosis', MedVLM:'Medical VLM',
          DrugMol:'Drug & Molecule Design', Protein:'Protein & Genome', Clinical:'Clinical Decision Support', Surgery:'Surgical AI',
          HealthMon:'Health Monitoring'
        }
      }
    };
    function t(key) { return i18n[currentLang][key] || i18n['zh'][key] || key; }
    function tn(task) { return i18n[currentLang].taskNames[task] || task; }

    function applyLang(lang) {
      currentLang = lang;
      localStorage.setItem('paperHubLang', lang);
      document.documentElement.lang = lang === 'zh' ? 'zh-CN' : 'en';
      document.title = t('docTitle');
      // Domain tabs
      document.querySelector('.domain-tab.all').textContent = t('tabAll');
      document.querySelector('.domain-tab.world_model').textContent = t('tabWM');
      document.querySelector('.domain-tab.physical_ai').textContent = t('tabPA');
      document.querySelector('.domain-tab.medical_ai').textContent = t('tabMA');
      // Stat labels
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.dataset.i18n;
        if (i18n[currentLang][key] !== undefined) el.textContent = i18n[currentLang][key];
      });
      // Search
      document.getElementById('searchInput').placeholder = t('searchPlaceholder');
      // Filters
      rebuildFilters();
      // Action buttons
      document.getElementById('hasCodeBtn').textContent = t('hasCode');
      document.getElementById('favoritesBtn').textContent = t('favorites');
      document.getElementById('exportBtn').textContent = t('export');
      // Lang toggle buttons
      document.querySelectorAll('#langToggle .lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === lang));
      // Re-render dynamic content
      if (allPapers.length) {
        renderSubdomains();
        renderCharts();
        applyFilters();
      }
    }

    // ====== Theme ======
    function getSystemTheme() { return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'; }
    function applyTheme(theme) {
      const effective = theme === 'system' ? getSystemTheme() : theme;
      document.documentElement.setAttribute('data-theme', effective);
      document.querySelectorAll('#themeToggle .toggle-btn').forEach(b => b.classList.toggle('active', b.dataset.theme === theme));
    }
    function setTheme(theme) { localStorage.setItem('paperHubTheme', theme); applyTheme(theme); }

    // ====== Init ======
    let allPapers = [], filteredPapers = [];
    let currentPage = 1;
    const PAGE_SIZE = 20;
    let currentDomain = 'all', currentTask = 'all', currentQuery = '';
    let currentYear = 'all', currentMonth = 'all', currentType = 'all', currentSort = 'date-desc';
    let showFavorites = false, showHasCode = false;
    let favorites = JSON.parse(localStorage.getItem('paperHubFavorites') || '[]');

    const domainConfig = {
      'world_model': {color:'#6366f1'},
      'physical_ai': {color:'#10b981'},
      'medical_ai': {color:'#f43f5e'}
    };
    const domainTasks = {
      'world_model': ['VidGen', 'NeRF', 'MBRL', 'Sim2Real', 'EmbodiedWM', 'Predictive'],
      'physical_ai': ['PINN', 'NeuralOp', 'Embodied', 'RobotLearn', 'FluidSim', 'Climate', '3DRecon'],
      'medical_ai': ['Pathology', 'MedImg', 'Cancer', 'MedVLM', 'DrugMol', 'Protein', 'Clinical', 'Surgery', 'HealthMon']
    };

    async function init() {
      try {
        const resp = await fetch('output/papers.json');
        allPapers = await resp.json();
        allPapers = allPapers.filter(p => p.year >= 2023);
        initFilters();  // Rebuild filters after data loads
        updateStats();
        renderSubdomains();
        renderCharts();
        applyFilters();
      } catch(e) {
        document.getElementById('papersGrid').innerHTML = `<div class="empty"><h3>${t('noDataTitle')}</h3><p>${t('noDataHint')}</p></div>`;
      }
    }

    function updateStats() {
      const now = new Date();
      const weekAgo = new Date(now.getTime() - 7*24*60*60*1000);
      let wm = 0, pa = 0, ma = 0, newWM = 0, newPA = 0, newMA = 0, total = 0, newTotal = 0;
      allPapers.forEach(p => {
        const isNew = new Date(p.published) >= weekAgo;
        const hasDomain = p._domains && p._domains.length > 0;
        if (hasDomain) { total++; if(isNew) newTotal++; }
        if (p._domains?.includes('world_model')) { wm++; if(isNew) newWM++; }
        if (p._domains?.includes('physical_ai')) { pa++; if(isNew) newPA++; }
        if (p._domains?.includes('medical_ai')) { ma++; if(isNew) newMA++; }
      });
      document.getElementById('totalCount').textContent = total;
      document.getElementById('newBadgeTotal').textContent = '+' + newTotal;
      document.getElementById('worldModelCount').textContent = wm;
      document.getElementById('newBadgeWM').textContent = '+' + newWM;
      document.getElementById('physicalAiCount').textContent = pa;
      document.getElementById('newBadgePA').textContent = '+' + newPA;
      document.getElementById('medicalAiCount').textContent = ma;
      document.getElementById('newBadgeMA').textContent = '+' + newMA;
    }

    function renderCharts() {
      const yearDomain = {world_model:{}, physical_ai:{}, medical_ai:{}};
      allPapers.forEach(p => {
        (p._domains||[]).forEach(d => {
          if(!yearDomain[d]) yearDomain[d] = {};
          yearDomain[d][p.year] = (yearDomain[d][p.year] || 0) + 1;
        });
      });
      const years = [...new Set(allPapers.filter(p => p._domains?.length).map(p => p.year))].sort();
      const yearTotals = {};
      years.forEach(y => {
        yearTotals[y] = (yearDomain.world_model[y]||0) + (yearDomain.physical_ai[y]||0) + (yearDomain.medical_ai[y]||0);
      });
      const maxTotal = Math.max(...Object.values(yearTotals), 1);

      let trendHtml = '<div class="trend-bar-group">';
      years.forEach(y => {
        const wm = yearDomain.world_model[y] || 0;
        const pa = yearDomain.physical_ai[y] || 0;
        const ma = yearDomain.medical_ai[y] || 0;
        const total = wm + pa + ma;
        const wmPct = (wm / maxTotal * 100).toFixed(1);
        const paPct = (pa / maxTotal * 100).toFixed(1);
        const maPct = (ma / maxTotal * 100).toFixed(1);
        trendHtml += `
          <div class="trend-year">
            <span class="trend-year-label">${y}</span>
            <div class="trend-bars">
              ${wm > 0 ? `<div class="trend-bar world_model" style="width:${wmPct}%" title="${t('trendLegendWM')}: ${wm}"></div>` : ''}
              ${pa > 0 ? `<div class="trend-bar physical_ai" style="width:${paPct}%" title="${t('trendLegendPA')}: ${pa}"></div>` : ''}
              ${ma > 0 ? `<div class="trend-bar medical_ai" style="width:${maPct}%" title="${t('trendLegendMA')}: ${ma}"></div>` : ''}
            </div>
            <span class="trend-count">${total}</span>
          </div>
        `;
      });
      trendHtml += '</div>';
      trendHtml += `
        <div style="display:flex;gap:1rem;margin-top:0.75rem;justify-content:center;">
          <span style="display:flex;align-items:center;gap:0.3rem;font-size:0.7rem;color:var(--text-secondary)">
            <span style="width:10px;height:10px;border-radius:2px;background:linear-gradient(90deg,#6366f1,#818cf8)"></span>${t('trendLegendWM')}
          </span>
          <span style="display:flex;align-items:center;gap:0.3rem;font-size:0.7rem;color:var(--text-secondary)">
            <span style="width:10px;height:10px;border-radius:2px;background:linear-gradient(90deg,#10b981,#34d399)"></span>${t('trendLegendPA')}
          </span>
          <span style="display:flex;align-items:center;gap:0.3rem;font-size:0.7rem;color:var(--text-secondary)">
            <span style="width:10px;height:10px;border-radius:2px;background:linear-gradient(90deg,#f43f5e,#fb7185)"></span>${t('trendLegendMA')}
          </span>
        </div>
      `;
      document.getElementById('yearTrendChart').innerHTML = trendHtml;
      renderHotTopics('world_model');
    }

    function renderHotTopics(domain) {
      const sixMonthsAgo = new Date();
      sixMonthsAgo.setMonth(sixMonthsAgo.getMonth() - 6);
      const papers = allPapers.filter(p => p._domains?.includes(domain) && new Date(p.published) >= sixMonthsAgo);
      const keywords = {};
      papers.forEach(p => {
        (p._tasks||[]).forEach(task => {
          const name = tn(task);
          keywords[name] = (keywords[name] || 0) + 1;
        });
      });
      const top = Object.entries(keywords).sort((a,b) => b[1]-a[1]).slice(0, 4);
      const maxCount = Math.max(...top.map(([,v]) => v), 1);

      const domainNames = {world_model: t('domainNameWM'), physical_ai: t('domainNamePA'), medical_ai: t('domainNameMA')};
      let html = '<div style="display:flex;gap:0.3rem;margin-bottom:0.7rem;">';
      ['world_model', 'physical_ai', 'medical_ai'].forEach(d => {
        html += `<button data-hot-domain="${d}" style="padding:0.25rem 0.6rem;border-radius:6px;font-size:0.7rem;cursor:pointer;border:1px solid ${d===domain ? domainConfig[d].color : 'var(--border)'};background:${d===domain ? domainConfig[d].color+'1a' : 'var(--surface-bg)'};color:${d===domain ? domainConfig[d].color : 'var(--text-muted)'};font-weight:${d===domain?'600':'400'};transition:all 0.2s;">${domainNames[d]}</button>`;
      });
      html += '</div>';

      top.forEach(([name, count], i) => {
        const pct = (count / maxCount * 100).toFixed(0);
        const rankClass = i === 0 ? 'rank-1' : i === 1 ? 'rank-2' : i === 2 ? 'rank-3' : 'rank-other';
        html += `
          <div class="hot-item">
            <span class="hot-rank ${rankClass}">${i+1}</span>
            <span class="hot-name">${name}</span>
            <div class="hot-bar-wrap">
              <div class="hot-bar ${domain}" style="width:${pct}%"></div>
            </div>
            <span class="hot-count">${count}</span>
          </div>
        `;
      });
      document.getElementById('hotTopicsChart').innerHTML = html;
    }

    function renderSubdomains() {
      const now = new Date();
      const weekAgo = new Date(now.getTime() - 7*24*60*60*1000);
      const grid = document.getElementById('subdomainGrid');
      let html = '';
      const papersToShow = currentDomain === 'all' ? allPapers : allPapers.filter(p => p._domains?.includes(currentDomain));
      const domainsToShow = currentDomain === 'all' ? ['world_model', 'physical_ai', 'medical_ai'] : [currentDomain];

      domainsToShow.forEach(domain => {
        const tasks = domainTasks[domain];
        if (currentDomain === 'all') {
          html += `<div class="subdomain-domain-header">${t('tab'+domain.split('_').map((w,i)=>i?w.charAt(0).toUpperCase()+w.slice(1):w).join('').replace('Worldmodel','WM').replace('Physicalai','PA').replace('Medicalai','MA'))}</div>`;
          // Simpler: use domain name map
          const dn = {world_model: t('domainNameWM'), physical_ai: t('domainNamePA'), medical_ai: t('domainNameMA')};
          html = html.replace(/<div class="subdomain-domain-header">.*?<\/div>$/, `<div class="subdomain-domain-header">${dn[domain]}</div>`);
        }
        tasks.forEach(task => {
          let total = 0, newNum = 0;
          papersToShow.forEach(p => {
            if (p._tasks?.includes(task)) {
              total++;
              if (new Date(p.published) >= weekAgo) newNum++;
            }
          });
          const isActive = currentTask === task ? 'active' : '';
          const badge = newNum > 0 ? `<span class="new-badge">+${newNum}</span>` : '';
          html += `
            <div class="subdomain-item ${isActive}" data-task="${task}">
              <span class="name">${tn(task)}</span>
              <span class="count">${total}</span>
              ${badge}
            </div>
          `;
        });
      });
      grid.innerHTML = html;
    }

    function rebuildFilters() {
      // Year
      const ySel = document.getElementById('yearFilter');
      const curY = ySel.value;
      ySel.innerHTML = `<option value="all">${t('allYears')}</option>`;
      if (allPapers.length) {
        const years = [...new Set(allPapers.map(p => p.year))].sort((a,b) => b - a);
        years.forEach(y => { ySel.innerHTML += `<option value="${y}">${y}${t('yearSuffix')}</option>`; });
      }
      ySel.value = (curY && [...ySel.options].some(o => o.value === curY)) ? curY : 'all';
      // Month
      const mSel = document.getElementById('monthFilter');
      const curM = mSel.value;
      mSel.innerHTML = `<option value="all">${t('allMonths')}</option>`;
      t('monthNames').forEach((n,i) => { mSel.innerHTML += `<option value="${i+1}">${n}</option>`; });
      mSel.value = (curM && [...mSel.options].some(o => o.value === curM)) ? curM : 'all';
      // Type
      const tSel = document.getElementById('typeFilter');
      const curT = tSel.value;
      tSel.innerHTML = `<option value="all">${t('allTypes')}</option><option value="Method">${t('typeMethod')}</option><option value="Dataset">${t('typeDataset')}</option><option value="Survey">${t('typeSurvey')}</option>`;
      tSel.value = (curT && [...tSel.options].some(o => o.value === curT)) ? curT : 'all';
      // Sort
      const sSel = document.getElementById('sortSelect');
      const curS = sSel.value;
      sSel.innerHTML = `<option value="date-desc">${t('sortNewest')}</option><option value="date-asc">${t('sortOldest')}</option>`;
      sSel.value = (curS && [...sSel.options].some(o => o.value === curS)) ? curS : 'date-desc';
    }

    function initFilters() { rebuildFilters(); }

    function switchDomain(domain) {
      currentDomain = domain;
      currentTask = 'all';
      document.querySelectorAll('.domain-tab').forEach(tab => tab.classList.toggle('active', tab.dataset.domain === domain));
      document.getElementById('subdomainSection').style.display = domain === 'all' ? 'none' : '';
      renderSubdomains();
      applyFilters();
    }

    function filterByTask(task) {
      currentTask = currentTask === task ? 'all' : task;
      renderSubdomains();
      applyFilters();
    }

    function applyFilters() {
      filteredPapers = allPapers.filter(p => {
        if (!p._domains || p._domains.length === 0) return false;
        if (currentDomain !== 'all' && !p._domains?.includes(currentDomain)) return false;
        if (currentTask !== 'all' && !p._tasks?.includes(currentTask)) return false;
        if (currentYear !== 'all' && p.year !== parseInt(currentYear)) return false;
        if (currentMonth !== 'all' && p.month !== parseInt(currentMonth)) return false;
        if (currentType !== 'all' && p.type !== currentType) return false;
        if (showHasCode && !p.has_code) return false;
        if (currentQuery) {
          const q = currentQuery.toLowerCase();
          if (!p.title?.toLowerCase().includes(q) && !p.abstract?.toLowerCase().includes(q) && !p.authors?.some(a => a.toLowerCase().includes(q))) return false;
        }
        if (showFavorites && !favorites.includes(p.id)) return false;
        return true;
      });
      filteredPapers.sort((a, b) => currentSort === 'date-desc' ? new Date(b.published) - new Date(a.published) : new Date(a.published) - new Date(b.published));
      currentPage = 1;
      renderPapers();
      renderPagination();
    }

    function renderPapers() {
      const start = (currentPage-1) * PAGE_SIZE;
      const pagePapers = filteredPapers.slice(start, start + PAGE_SIZE);
      document.getElementById('resultsCount').textContent = t('paperCount')(filteredPapers.length);
      if (!pagePapers.length) { document.getElementById('papersGrid').innerHTML = `<div class="empty">${t('noMatch')}</div>`; return; }
      const typeLabel = {Method: t('badgeMethod'), Dataset: t('badgeDataset'), Survey: t('badgeSurvey')};
      const domainLabel = {world_model: t('domainNameWM'), physical_ai: t('domainNamePA'), medical_ai: t('domainNameMA')};
      document.getElementById('papersGrid').innerHTML = pagePapers.map(p => `
        <div class="paper-card">
          <div class="paper-domains">
            ${(p._domains||[]).map(d => `<span class="paper-domain-badge ${d}">${domainLabel[d]||d}</span>`).join('')}
            <span class="paper-type ${p.type}">${typeLabel[p.type]||p.type}</span>
          </div>
          <h3 class="paper-title">${escapeHTML(p.title)}</h3>
          <div class="paper-meta"><span>📅 ${p.published?.split('T')[0]}</span><span>✍️ ${(p.authors||[]).slice(0,2).join(', ')}${p.authors?.length>2?'...':''}</span>${p.has_code?'<span>💻</span>':''}</div>
          <p class="paper-abstract" data-id="${p.id}">${escapeHTML(p.abstract)}</p>
          <span class="abstract-toggle" data-id="${p.id}">${t('expandAbstract')}</span>
          <div class="paper-tags">${(p._tasks||[]).slice(0,5).map(task => `<span class="paper-task-tag">${tn(task)}</span>`).join('')}</div>
          <div class="paper-actions">
            <a href="${p.arxiv_url}" target="_blank" class="paper-action arxiv">🔗 arXiv</a>
            ${p.pdf_url ? `<a href="${p.pdf_url}" target="_blank" class="paper-action pdf">📄 PDF</a>` : ''}
            ${p.code ? `<a href="${p.code}" target="_blank" class="paper-action code">💻 code</a>` : ''}
            <button class="paper-action favorite ${favorites.includes(p.id)?'active':''}" data-fav-id="${p.id}">⭐</button>
          </div>
        </div>
      `).join('');
    }

    function renderPagination() {
      const totalPages = Math.ceil(filteredPapers.length / PAGE_SIZE);
      if (totalPages <= 1) { document.getElementById('pagination').innerHTML = ''; return; }
      let html = `<button class="page-btn" data-page="${currentPage-1}" ${currentPage===1?'disabled':''}>‹</button>`;
      for (let i = 1; i <= totalPages; i++) {
        if (i === 1 || i === totalPages || (i >= currentPage-1 && i <= currentPage+1)) html += `<button class="page-btn ${i===currentPage?'active':''}" data-page="${i}">${i}</button>`;
        else if (i === currentPage-2 || i === currentPage+2) html += `<span style="color:var(--text-muted)">…</span>`;
      }
      html += `<button class="page-btn" data-page="${currentPage+1}" ${currentPage===totalPages?'disabled':''}>›</button>`;
      document.getElementById('pagination').innerHTML = html;
    }
    function goPage(n) { currentPage = n; renderPapers(); renderPagination(); window.scrollTo({top: 0, behavior: 'smooth'}); }

    function toggleFavorite(id) {
      if (favorites.includes(id)) favorites = favorites.filter(f => f !== id);
      else favorites.push(id);
      localStorage.setItem('paperHubFavorites', JSON.stringify(favorites));
      if (showFavorites) applyFilters();
      else renderPapers();
    }

    function exportBibtex() {
      const papers = allPapers.filter(p => favorites.includes(p.id));
      if (!papers.length) { alert(t('alertNoFav')); return; }
      let bib = '';
      papers.forEach((p, i) => {
        const key = (p.authors?.[0]?.split(' ').pop() || 'unknown').toLowerCase();
        bib += `@article{${key}${p.year}${i},\n  title={${p.title}},\n  author={${(p.authors||[]).join(' and ')}},\n  year={${p.year}},\n  eprint={${p.id}},\n  archivePrefix={arXiv}\n}\n\n`;
      });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(new Blob([bib], {type: 'text/plain'}));
      a.download = `favorites_${new Date().toISOString().slice(0,10)}.bib`;
      a.click();
    }

    function escapeHTML(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    // ====== Event listeners ======

    // Abstract toggle
    document.getElementById('papersGrid').addEventListener('click', e => {
      const toggle = e.target.closest('.abstract-toggle');
      if (!toggle) return;
      const id = toggle.dataset.id;
      const abs = document.querySelector(`.paper-abstract[data-id="${CSS.escape(id)}"]`);
      if (!abs) return;
      abs.classList.toggle('expanded');
      toggle.textContent = abs.classList.contains('expanded') ? t('collapseAbstract') : t('expandAbstract');
    });

    // Favorite toggle
    document.getElementById('papersGrid').addEventListener('click', e => {
      const btn = e.target.closest('[data-fav-id]');
      if (!btn) return;
      toggleFavorite(btn.dataset.favId);
    });

    // Theme
    document.getElementById('themeToggle').addEventListener('click', e => {
      const btn = e.target.closest('[data-theme]');
      if (!btn) return;
      setTheme(btn.dataset.theme);
    });

    // Language
    document.getElementById('langToggle').addEventListener('click', e => {
      const btn = e.target.closest('[data-lang]');
      if (!btn) return;
      applyLang(btn.dataset.lang);
    });

    // Subdomain task filter
    document.getElementById('subdomainGrid').addEventListener('click', e => {
      const item = e.target.closest('.subdomain-item');
      if (!item) return;
      const task = item.getAttribute('data-task');
      if (task) filterByTask(task);
    });

    // Hot topics domain toggle
    document.getElementById('hotTopicsChart').addEventListener('click', e => {
      const btn = e.target.closest('[data-hot-domain]');
      if (!btn) return;
      renderHotTopics(btn.dataset.hotDomain);
    });

    // Stat cards
    document.querySelector('.stats-row').addEventListener('click', e => {
      const card = e.target.closest('[data-switch-domain]');
      if (!card) return;
      switchDomain(card.dataset.switchDomain);
    });

    // Pagination
    document.getElementById('pagination').addEventListener('click', e => {
      const btn = e.target.closest('[data-page]');
      if (!btn || btn.disabled) return;
      goPage(parseInt(btn.dataset.page));
    });

    // Domain tabs
    document.querySelectorAll('.domain-tab').forEach(tab => {
      tab.addEventListener('click', function() {
        currentDomain = this.dataset.domain;
        currentTask = 'all';
        document.querySelectorAll('.domain-tab').forEach(x => x.classList.remove('active'));
        this.classList.add('active');
        document.getElementById('subdomainSection').style.display = currentDomain === 'all' ? 'none' : '';
        renderSubdomains();
        applyFilters();
      });
    });

    // Filter changes
    document.getElementById('searchInput').addEventListener('input', e => { currentQuery = e.target.value; applyFilters(); });
    document.getElementById('yearFilter').addEventListener('change', e => { currentYear = e.target.value; applyFilters(); });
    document.getElementById('monthFilter').addEventListener('change', e => { currentMonth = e.target.value; applyFilters(); });
    document.getElementById('typeFilter').addEventListener('change', e => { currentType = e.target.value; applyFilters(); });
    document.getElementById('sortSelect').addEventListener('change', e => { currentSort = e.target.value; applyFilters(); });
    document.getElementById('hasCodeBtn').addEventListener('click', function() { showHasCode = !showHasCode; this.classList.toggle('active', showHasCode); applyFilters(); });
    document.getElementById('favoritesBtn').addEventListener('click', function() { showFavorites = !showFavorites; this.classList.toggle('active', showFavorites); applyFilters(); });
    document.getElementById('exportBtn').addEventListener('click', exportBibtex);

    // System theme change listener
    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
      if (localStorage.getItem('paperHubTheme') === 'system') applyTheme('system');
    });

    // ====== Boot ======
    (function() {
      // Apply saved theme
      const savedTheme = localStorage.getItem('paperHubTheme') || 'dark';
      applyTheme(savedTheme);
      // Apply saved language
      applyLang(currentLang);
      // Load data
      init();
    })();
  </script>
</body>
</html>
